{% extends "base.html" %}
{% block title %}Login - CSAS{% endblock %}
{% block content %}
<section class="form-section">
  <h1>Login</h1>
  <p>Use your university email or university ID.</p>
  <form method="post" action="/api/auth/login" class="auth-form" id="login-form">
    <label for="username">Email or University ID</label>
    <input id="username" name="username" type="text" required autocomplete="username">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password">
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
  <p>Login uses OAuth2 form; for API use POST /api/auth/login with form body.</p>
  <p><a href="/register">Register</a></p>
</section>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const form = this;
    const fd = new FormData(form);
    fetch(form.action, { method: 'POST', body: new URLSearchParams(fd), headers: { 'Accept': 'application/json' } })
      .then(r => r.json())
      .then(d => {
        if (d.access_token) {
          localStorage.setItem('token', d.access_token);
          window.location.href = '/';
        } else {
          alert(d.detail || 'Login failed');
        }
      })
      .catch(() => alert('Login failed'));
  });
</script>
{% endblock %}
